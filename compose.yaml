services:
  transactionservice:
    image: transactionservice
    build:
      context: .
      dockerfile: TransactionService/Dockerfile
    environment:
      - WRITE_DB_CONNSTRING=Host=postgres;Port=5432;Database=transactions;Username=postgres;Password=postgres
      - READ_DB_CONNSTRING=Host=postgres;Port=5432;Database=transactions;Username=postgres;Password=postgres
      - REDIS_CONNSTRING=redis:6379
      - EXCHANGE_RATE_BASE_URL=https://api.fiscaldata.treasury.gov/services/api/fiscal_service/v1/accounting/od/rates_of_exchange
      - EXCHANGE_RATE_CACHE_TTL_HOURS=24 
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: transactions
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  
volumes:
  postgres_data:
  redis_data:
